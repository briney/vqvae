trained_model_dir: "path/to/trained_model"  # Directory containing the trained model assets
checkpoint_path: "checkpoints/best_valid.pth"  # Checkpoint file to restore before encoding
config_vqvae: "config_vqvae.yaml"  # Path to the VQ-VAE training configuration
config_encoder: "config_gcpnet_encoder.yaml"  # Encoder configuration to rebuild the model
config_decoder: "config_geometric_decoder.yaml"  # Decoder configuration to rebuild the model

data_path: "path/to/inference/h5/data"  # HDF5 dataset providing sequences to encode
output_base_dir: "inference_encode_results"  # Directory for saved VQ index outputs

batch_size: 16  # Number of sequences processed per encoding step
shuffle: True  # Shuffle encoding dataset before iteration
num_workers: 0  # Worker processes for the encoding dataloader
max_task_samples: 5000000  # Limit on the total number of samples to encode
vq_indices_csv_filename: "vq_indices.csv"  # Output filename for the encoded index CSV
mixed_precision: "bf16"  # Mixed precision policy during encoding (options: no, fp16, bf16, fp8)

tqdm_progress_bar: True  # Display tqdm progress bars while encoding
