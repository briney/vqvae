trained_model_dir: "path/to/trained_model"  # Directory where the trained model and configs reside
checkpoint_path: "checkpoints/best_valid.pth"  # Relative path to the checkpoint to evaluate
config_vqvae: "config_vqvae.yaml"  # VQ-VAE training configuration file to reload
config_encoder: "config_gcpnet_encoder.yaml"  # Encoder configuration file path
config_decoder: "config_geometric_decoder.yaml"  # Decoder configuration file path

data_path: "path/to/evaluation/h5/data"  # HDF5 dataset used for evaluation
output_base_dir: "evaluation_results"  # Directory where evaluation outputs are written

batch_size: 8  # Number of examples processed per evaluation step
shuffle: True  # Shuffle evaluation dataset before iterating
num_workers: 0  # Worker processes for the evaluation dataloader
max_task_samples: 5000000  # Upper bound on samples drawn from the evaluation set
vq_indices_csv_filename: "vq_indices.csv"  # Output filename for VQ index dumps when requested
alignment_strategy: "kabsch"  # Alignment method for RMSD metrics (options: kabsch, no)
mixed_precision: "bf16"  # Mixed precision policy during evaluation (options: no, fp16, bf16, fp8)

tqdm_progress_bar: True  # Display tqdm progress bars while evaluating
