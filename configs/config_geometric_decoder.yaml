dimension: 1024  # Hidden dimensionality used for decoder transformer layers
ff_mult: 4  # Multiplier controlling the feed-forward expansion ratio
depth: 12  # Number of transformer blocks in the decoder stack
heads: 8  # Attention head count per block in the decoder
rotary_pos_emb: True  # Enable rotary positional embeddings within attention layers
attn_flash: True  # Use FlashAttention kernels when available for speedups
attn_kv_heads: 2  # Quantity of key/value heads for grouped-query attention
qk_norm: True  # Apply layer normalisation to query and key projections
pre_norm: True  # Use pre-layer normalisation architecture
residual_attn: False  # Add extra residual attention pathway when enabled (requires pre_norm False)
num_memory_tokens: 0  # Number of learned memory tokens appended to the sequence
causal: False  # Disable causal masking to allow bidirectional attention

direction_loss_bins: 16  # Discretisation bins for direction classification loss
pos_scale_factor: 1.0  # Scaling factor applied to predicted coordinate deltas
