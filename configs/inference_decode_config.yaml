trained_model_dir: "path/to/trained_model"  # Directory containing the trained model assets
checkpoint_path: "checkpoints/best_valid.pth"  # Checkpoint file to restore before decoding
config_vqvae: "config_vqvae.yaml"  # Path to the VQ-VAE training configuration
config_encoder: "config_gcpnet_encoder.yaml"  # Encoder configuration to rebuild the model
config_decoder: "config_geometric_decoder.yaml"  # Decoder configuration to rebuild the model

indices_csv_path: "path/to/vq_indices.csv"  # CSV of code indices to decode back into structures
output_base_dir: "inference_decode_results"  # Directory for decoded structure outputs

batch_size: 16  # Number of sequences decoded per inference step
shuffle: True  # Shuffle decoding inputs before batching
num_workers: 0  # Worker processes for the decoding dataloader
max_task_samples: 5000000  # Cap on the total number of samples to decode
mixed_precision: "bf16"  # Mixed precision policy during decoding (options: no, fp16, bf16, fp8)

tqdm_progress_bar: True  # Display tqdm progress bars while decoding
