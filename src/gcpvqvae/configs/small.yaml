# Small-scale configuration for quick smoke tests on a modest mmCIF folder.

data:
  root: "data/small"
  k: 12
  num_dataloader_workers: 4
  cache: true

model:
  gcp:
    embedding:
      node_scalar_dim: 49
      node_vector_dim: 2
      edge_scalar_dim: 9
      edge_scalar_input_dim: 8
      edge_vector_dim: 1
      output:
        scalar: 128
        vector: 16
    message_passing:
      width:
        scalar: 128
        vector: 16
      scalar_bottleneck_factor: 0.5
      vector_bottleneck_factor: 0.5
      pooling: mean
    feed_forward:
      width:
        scalar: 256
        vector: 16
    latent_dim: 128
    num_layers: 6
    dropout: 0.0
    vector_gate: true
    enable_e3_equivariance: true
    node_inputs: true
    predict_node_positions: false
    predict_node_rep: false
    use_gcp_dropout: true
    norm_pos_diff: false
    init: random
    init_checkpoint: null
    strict_init: true
  adapter:
    enabled: true
    output_dim: 128
  vq:
    num_codes: 512
    dim: 128
    beta: 0.25
    decay: 0.99
    kmeans_iters: 5
    orthogonal_reg_weight: 1.0
  encoder:
    model_dim: 384
    num_layers: 4
    num_heads: 6
    num_kv_heads: 2
    dropout: 0.0
  decoder:
    model_dim: 384
    num_layers: 6
    num_heads: 6
    num_kv_heads: 1
    dropout: 0.0

train:
  seed: 1234
  amp: false
  clip_grad: 1.0
  random_rotation: true
  checkpoint_interval: 5
  output_dir: "runs/small"
  log:
    enabled: false
    project: null
    entity: null
    run_name: null
    tags: []
    dir: null
    mode: null
    interval: 5
  eval:
    interval: null
    root: null
    batch_size: 1
  export:
    enabled: false
  stages:
    - name: small
      length_cap: 512
      batch_size: 4
      base_lr: 0.0003
      min_lr: 0.00001
      warmup_steps: 500
      epochs: 3
      accumulation_steps: 1
      nan_mask_prob: 0.0
      nan_mask_span: [1, 1]
