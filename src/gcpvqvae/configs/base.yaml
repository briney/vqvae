# Full-scale training configuration reflecting the two-stage schedule described
# in the manuscript.  The defaults match Table 4/5 and can serve as a template
# for distributed runs once adequate data is available.

data:
  root: "data/train"          # path to a directory with mmCIF files
  k: 16                        # kNN edges per residue
  num_dataloader_workers: 8
  cache: true

model:
  gcp:
    embedding:
      node_scalar_dim: 74
      node_vector_dim: 2
      edge_scalar_dim: 32
      edge_scalar_input_dim: 6
      edge_vector_dim: 4
      output:
        scalar: 128
        vector: 16
    message_passing:
      width:
        scalar: 128
        vector: 16
      scalar_bottleneck_factor: 0.5
      vector_bottleneck_factor: 0.5
      pooling: mean
    feed_forward:
      width:
        scalar: 256
        vector: 16
    latent_dim: 128
    num_layers: 6
    dropout: 0.0
    vector_gate: true
    enable_e3_equivariance: true
    node_inputs: true
    predict_node_positions: false
    predict_node_rep: false
    use_gcp_dropout: true
    norm_pos_diff: false
    init: pretrained            # set to "random" to disable checkpoint initialisation
    init_checkpoint: null
    strict_init: false
  vq:
    num_codes: 4096
    dim: 128
    beta: 0.25
    decay: 0.99
    kmeans_init: true
    kmeans_iters: 10
    stochastic_sample_codes: true
    sample_codebook_temp: 1.0
    orthogonal_reg_weight: 10.0
    orthogonal_reg_max_codes: 512
    orthogonal_reg_active_codes_only: true
    return_zeros_for_masked_padding: true
  encoder:
    model_dim: 1024
    output_dim: 128
    num_layers: 12
    num_heads: 16
    num_kv_heads: 4
    dropout: 0.0
    ffn_multiplier: 4.0
  decoder:
    input_dim: 128
    model_dim: 1024
    num_layers: 16
    num_heads: 16
    num_kv_heads: 1
    dropout: 0.0
    ffn_multiplier: 4.0
    use_ndlinear: true
    max_length: 2048
    num_memory_tokens: 0
    use_flash_attn: false
    use_qk_norm: false
    causal: false

train:
  seed: 42
  amp: true
  clip_grad: 1.0
  random_rotation: true
  checkpoint_interval: 5000
  output_dir: "runs/full"
  log:
    enabled: false
    project: null
    entity: null
    run_name: null
    tags: []
    dir: null
    mode: null
    interval: 100
  eval:
    interval: null              # run evaluation every N optimisation steps (null disables)
    root: null                  # path to directory of evaluation PDB/mmCIF files
    batch_size: 1
  export:
    enabled: true
    directory: "runs/full/exports"
    on_stage_end: true
    num_samples: 2
  stages:
    - name: stage1
      length_cap: 512
      batch_size: 16
      base_lr: 0.0001
      min_lr: 0.000001
      warmup_steps: 16000
      total_steps: 375000
      accumulation_steps: 1
      nan_mask_prob: 0.0
      nan_mask_span: [1, 1]
    - name: stage2
      length_cap: 1280
      batch_size: 4
      base_lr: 0.00005
      min_lr: 0.000001
      warmup_steps: 16000
      total_steps: 1500000
      accumulation_steps: 1
      nan_mask_prob: 0.05
      nan_mask_span: [1, 30]
