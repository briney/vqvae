# Example configuration for pretraining the standalone GCPNet encoder.

data:
  root: "data/train"
  length_cap: 512
  k: 16
  num_dataloader_workers: 4
  cache: true
  show_progress: true

model:
  gcp:
    hidden_scalar_dim: 128
    hidden_vector_dim: 16
    edge_scalar_dim: 32
    edge_vector_dim: 1
    latent_dim: 256
    layers: 6
  rotation:
    input_dim: null
    translation_scale: 1.0

train:
  seed: 42
  amp: true
  grad_clip: 1.0
  random_rotation: true
  epochs: 5
  batch_size: 16
  accumulation_steps: 1
  learning_rate: 0.0003
  min_lr: 0.00001
  warmup_steps: 500
  weight_decay: 0.0001
  log_interval: 50
  checkpoint_interval: 1000
  output_dir: "runs/gcpnet_pretrain"
