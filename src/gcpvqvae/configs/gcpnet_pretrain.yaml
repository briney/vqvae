# Example configuration for pretraining the standalone GCPNet encoder.

data:
  root: "data/train"
  length_cap: 512
  k: 16
  num_dataloader_workers: 4
  num_parsing_workers: null
  cache: true
  show_progress: true

model:
  gcp:
    embedding:
      node_scalar_dim: 49
      node_vector_dim: 2
      edge_scalar_dim: 9
      edge_scalar_input_dim: 8
      edge_vector_dim: 1
      output:
        scalar: 128
        vector: 16
    message_passing:
      width:
        scalar: 128
        vector: 16
      scalar_bottleneck_factor: 0.5
      vector_bottleneck_factor: 0.5
      pooling: mean
    feed_forward:
      width:
        scalar: 256
        vector: 16
    latent_dim: 128
    num_layers: 6
    dropout: 0.0
    vector_gate: true
    enable_e3_equivariance: true
    node_inputs: true
    predict_node_positions: false
    predict_node_rep: false
    use_gcp_dropout: true
    norm_pos_diff: false
  rotation:
    input_dim: null
    decoder_output_scaling_factor: 1.0

train:
  seed: 42
  amp: true
  grad_clip: 1.0
  random_rotation: true
  epochs: 5
  batch_size: 16
  accumulation_steps: 1
  learning_rate: 0.0003
  min_lr: 0.00001
  warmup_steps: 500
  weight_decay: 0.0001
  log_interval: 50
  checkpoint_interval: 1000
  output_dir: "runs/gcpnet_pretrain"
