# Extra-small configuration matching the reduced model used in the unit tests.
# Suitable for debugging and CI runs where fast iteration is required.

data:
  root: "tests/test_data/cif_50"
  k: 4
  num_dataloader_workers: 0
  cache: true

model:
  gcp:
    hidden_scalar_dim: 16
    hidden_vector_dim: 4
    edge_scalar_dim: 8
    edge_vector_dim: 1
    latent_dim: 16
    layers: 2
    init: random
    init_checkpoint: null
    strict_init: true
  vq:
    num_codes: 16
    dim: 16
    beta: 0.25
    decay: 0.99
    kmeans_iters: 1
  encoder:
    model_dim: 64
    num_layers: 2
    num_heads: 2
    num_kv_heads: 1
    dropout: 0.0
  decoder:
    model_dim: 64
    num_layers: 2
    num_heads: 2
    num_kv_heads: 1
    dropout: 0.0

train:
  seed: 7
  amp: false
  clip_grad: 1.0
  random_rotation: false
  checkpoint_interval: null
  output_dir: "runs/xsmall"
  log:
    enabled: false
    project: null
    entity: null
    run_name: null
    tags: []
    dir: null
    mode: null
    interval: 1
  eval:
    interval: null
    root: null
    batch_size: 1
  export:
    enabled: false
  stages:
    - name: debug
      length_cap: 128
      batch_size: 2
      base_lr: 0.001
      min_lr: 0.0001
      warmup_steps: 1
      total_steps: 4
      accumulation_steps: 1
      nan_mask_prob: 0.0
      nan_mask_span: [1, 1]
