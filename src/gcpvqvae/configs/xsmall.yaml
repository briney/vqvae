# Extra-small configuration matching the reduced model used in the unit tests.
# Suitable for debugging and CI runs where fast iteration is required.

data:
  root: "tests/test_data/cif_50"
  k: 4
  num_dataloader_workers: 0
  num_parsing_workers: null
  cache: true

model:
  gcp:
    embedding:
      node_scalar_dim: 74
      node_vector_dim: 2
      edge_scalar_dim: 32
      edge_scalar_input_dim: 6
      edge_vector_dim: 4
      output:
        scalar: 128
        vector: 16
    message_passing:
      width:
        scalar: 128
        vector: 16
      scalar_bottleneck_factor: 0.5
      vector_bottleneck_factor: 0.5
      pooling: mean
    feed_forward:
      width:
        scalar: 256
        vector: 16
    latent_dim: 128
    num_layers: 6
    dropout: 0.0
    vector_gate: true
    enable_e3_equivariance: true
    node_inputs: true
    predict_node_positions: false
    predict_node_rep: false
    use_gcp_dropout: true
    norm_pos_diff: false
    init: pretrained            # set to "random" to disable checkpoint initialisation
    init_checkpoint: null
    strict_init: false
  adapter:
    enabled: true
    output_dim: 32
  vq:
    num_codes: 16
    dim: 128
    beta: 0.25
    decay: 0.99
    kmeans_iters: 1
  encoder:
    model_dim: 64
    output_dim: 128
    num_layers: 2
    num_heads: 2
    num_kv_heads: 1
    dropout: 0.0
  decoder:
    input_dim: 128
    model_dim: 64
    num_layers: 2
    num_heads: 2
    num_kv_heads: 1
    dropout: 0.0
    use_ndlinear: false
    max_length: 128
    num_memory_tokens: 0
    use_flash_attn: false
    use_qk_norm: false
    causal: false

train:
  seed: 7
  amp: false
  clip_grad: 1.0
  random_rotation: false
  checkpoint_interval: null
  output_dir: "runs/xsmall"
  log:
    enabled: false
    project: null
    entity: null
    run_name: null
    tags: []
    dir: null
    mode: null
    interval: 1
  eval:
    interval: null
    root: null
    batch_size: 1
  export:
    enabled: false
  stages:
    - name: debug
      length_cap: 128
      batch_size: 2
      base_lr: 0.001
      min_lr: 0.0001
      warmup_steps: 1
      total_steps: 4
      accumulation_steps: 1
      nan_mask_prob: 0.0
      nan_mask_span: [1, 1]
